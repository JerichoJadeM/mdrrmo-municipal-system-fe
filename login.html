<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="MDRRMO Forecasting and Emergency Response System - Login">
    <meta name="theme-color" content="#1a3a52">
    <title>Login - MDRRMO Forecasting System</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <div class="login-container">
        <!-- Header with Branding -->
        <div class="login-header">
            <h1>MDRRMO Forecasting System</h1>
            <p>Disaster Risk Reduction & Management Office</p>
        </div>

        <!-- Message Notification Container (At the top for visibility) -->
        <div class="message-container" id="messageContainer">
            <div id="message" role="alert" aria-live="polite"></div>
        </div>

        <!-- Login Form -->
        <div class="form-content">
            <form id="loginForm" novalidate>
                <div class="form-group">
                    <label for="email">Email Address or Username</label>
                    <input 
                        type="text" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email or username" 
                        required 
                        aria-label="Email Address or Username"
                    />
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password" 
                        required 
                        aria-label="Password"
                    />
                </div>

                <div class="form-group">
                    <button type="submit" class="btn-submit" id="submitBtn">Login</button>
                </div>
            </form>
        </div>

        <!-- Footer with Links -->
        <div class="login-footer">
            <p>
                <a href="register.html">Create New Account</a> | 
                <a href="#">Forgot Password?</a>
            </p>
            <p style="font-size: 12px; opacity: 0.8;">
                For emergencies, contact your local DRRM Office or emergency hotline
            </p>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
